name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Lint and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Check dashboard artifacts
        run: make dashboard-check
